seed: 42

# Shared CNN(image) + MLP(proprio) feature trunk for policy and value.
# Works on the Direct workflow's Dict observation space.
models:
  separate: False
  policy:
    class: GaussianMixin
    clip_actions: True
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: 0.0
    network:
      - name: features_extractor
        input: permute(OBSERVATIONS["camera"], (0, 3, 1, 2))  # NHWC -> NCHW
        layers:
          - conv2d: {out_channels: 16, kernel_size: 5, stride: 3, padding: 0}
          - conv2d: {out_channels: 32, kernel_size: 3, stride: 2, padding: 0}
          - conv2d: {out_channels: 32, kernel_size: 3, stride: 1, padding: 0}
          - flatten
          - linear: 128
        activations: [relu, relu, relu, null, tanh]
      - name: proprio
        input: OBSERVATIONS["proprio"]
        layers: [64, 64]
        activations: elu
      - name: net
        input: concatenate([features_extractor, proprio])
        layers: [128, 64]
        activations: elu
    output: ACTIONS
  value:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: features_extractor
        input: permute(OBSERVATIONS["camera"], (0, 3, 1, 2))
        layers:
          - conv2d: {out_channels: 16, kernel_size: 5, stride: 3, padding: 0}
          - conv2d: {out_channels: 32, kernel_size: 3, stride: 2, padding: 0}
          - conv2d: {out_channels: 32, kernel_size: 3, stride: 1, padding: 0}
          - flatten
          - linear: 128
        activations: [relu, relu, relu, null, tanh]
      - name: proprio
        input: OBSERVATIONS["proprio"]
        layers: [64, 64]
        activations: elu
      - name: net
        input: concatenate([features_extractor, proprio])
        layers: [128, 64]
        activations: elu
    output: ONE

memory:
  class: RandomMemory
  memory_size: -1

agent:
  class: PPO
  rollouts: 24
  learning_epochs: 5
  mini_batches: 4
  discount_factor: 0.99
  lambda: 0.95
  learning_rate: 3.0e-04
  learning_rate_scheduler: KLAdaptiveLR
  learning_rate_scheduler_kwargs:
    kl_threshold: 0.01
  # Dict observations can't be fed to the running standard scaler, so disable
  # the state preprocessor (proprio magnitudes are already small).
  state_preprocessor: null
  value_preprocessor: RunningStandardScaler
  value_preprocessor_kwargs: null
  random_timesteps: 0
  learning_starts: 0
  grad_norm_clip: 1.0
  ratio_clip: 0.2
  value_clip: 0.2
  clip_predicted_values: True
  entropy_loss_scale: 0.01
  value_loss_scale: 1.0
  kl_threshold: 0.0
  rewards_shaper_scale: 1.0
  experiment:
    directory: "so101_reachavoid"
    experiment_name: ""
    write_interval: auto
    checkpoint_interval: auto

trainer:
  class: SequentialTrainer
  timesteps: 100000
  environment_info: log
