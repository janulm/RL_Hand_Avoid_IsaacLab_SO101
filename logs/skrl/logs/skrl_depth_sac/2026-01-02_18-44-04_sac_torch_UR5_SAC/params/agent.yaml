seed: 42
models:
  separate: true
  policy:
    class: GaussianMixin
    clip_actions: false
    clip_log_std: true
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: 0.0
    network:
    - name: camera_features
      input: permute(OBSERVATIONS["image"], (0, 3, 1, 2))
      layers:
      - conv2d:
          out_channels: 32
          kernel_size: 8
          stride: 4
          padding: 0
      - conv2d:
          out_channels: 64
          kernel_size: 4
          stride: 2
          padding: 0
      - conv2d:
          out_channels: 128
          kernel_size: 3
          stride: 1
          padding: 0
      - flatten
      - linear: 512
      activations:
      - relu
      - relu
      - relu
      - null
      - tanh
    - name: proprioception
      input: OBSERVATIONS["state"]
      layers:
      - 256
      - 128
      - 64
      activations:
      - relu
      - relu
      - relu
    - name: net
      input: concatenate([camera_features, proprioception])
      layers:
      - 256
      - 128
      - 64
      activations:
      - relu
      - relu
      - relu
    output: ACTIONS
  critic_1:
