# =============================================================================
# Experiment: reach_only_vision
# Reach-only WITH vision. Same task as reach_only_proprio, but the policy gets
# the overhead RGB + hand-mask image (CNN) plus proprio. The mask is empty here
# (no hand), so this mostly validates the CNN path + camera framing.
# =============================================================================
name: reach_only_vision
task: Isaac-SO-ARM101-ReachAvoid-Direct-v0
num_envs: 128           # vision is VRAM-bound (seg disables instancing)
max_iterations: 600
seed: 42

# --- environment overrides ---------------------------------------------------
env:
  use_vision: true
  hand_spawn_prob: 0.0
  camera_view: overhead
  obs_mode: rgb+mask
  mask_source: seg
  show_goal_marker: true
  target_resample_time_s: 4.0
  clamp_targets_to_reach: false
  target_x_range: [-0.30, 0.30]
  target_y_range: [-0.30, 0.30]
  target_z_range: [0.02, 0.40]

# --- agent: full skrl PPO config (CNN over camera + MLP over proprio) --------
agent:
  seed: 42
  models:
    separate: False
    policy:
      class: GaussianMixin
      clip_actions: True
      clip_log_std: True
      min_log_std: -20.0
      max_log_std: 2.0
      initial_log_std: 0.0
      network:
        - name: features_extractor
          input: permute(OBSERVATIONS["camera"], (0, 3, 1, 2))  # NHWC -> NCHW
          layers:
            - conv2d: {out_channels: 16, kernel_size: 5, stride: 3, padding: 0}
            - conv2d: {out_channels: 32, kernel_size: 3, stride: 2, padding: 0}
            - conv2d: {out_channels: 32, kernel_size: 3, stride: 1, padding: 0}
            - flatten
            - linear: 128
          activations: [relu, relu, relu, null, tanh]
        - name: proprio
          input: OBSERVATIONS["proprio"]
          layers: [64, 64]
          activations: elu
        - name: net
          input: concatenate([features_extractor, proprio])
          layers: [128, 64]
          activations: elu
      output: ACTIONS
    value:
      class: DeterministicMixin
      clip_actions: False
      network:
        - name: features_extractor
          input: permute(OBSERVATIONS["camera"], (0, 3, 1, 2))
          layers:
            - conv2d: {out_channels: 16, kernel_size: 5, stride: 3, padding: 0}
            - conv2d: {out_channels: 32, kernel_size: 3, stride: 2, padding: 0}
            - conv2d: {out_channels: 32, kernel_size: 3, stride: 1, padding: 0}
            - flatten
            - linear: 128
          activations: [relu, relu, relu, null, tanh]
        - name: proprio
          input: OBSERVATIONS["proprio"]
          layers: [64, 64]
          activations: elu
        - name: net
          input: concatenate([features_extractor, proprio])
          layers: [128, 64]
          activations: elu
      output: ONE
  memory:
    class: RandomMemory
    memory_size: -1
  agent:
    class: PPO
    rollouts: 24
    learning_epochs: 5
    mini_batches: 4
    discount_factor: 0.99
    lambda: 0.95
    learning_rate: 3.0e-04   # CNN is more LR-sensitive than the proprio MLP
    learning_rate_scheduler: KLAdaptiveLR
    learning_rate_scheduler_kwargs:
      kl_threshold: 0.01
    state_preprocessor: null
    value_preprocessor: RunningStandardScaler
    value_preprocessor_kwargs: null
    random_timesteps: 0
    learning_starts: 0
    grad_norm_clip: 1.0
    ratio_clip: 0.2
    value_clip: 0.2
    clip_predicted_values: True
    entropy_loss_scale: 0.01
    value_loss_scale: 1.0
    kl_threshold: 0.0
    rewards_shaper_scale: 1.0
    experiment:
      directory: "so101_reachavoid"
      experiment_name: ""
      write_interval: auto
      checkpoint_interval: auto
  trainer:
    class: SequentialTrainer
    timesteps: 100000        # overridden by max_iterations * rollouts
    environment_info: log
